# 通用配置
server.port=10082
spring.application.name=hrms

#数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:12345678}
spring.datasource.url=jdbc:mysql://${MYSQL_SERVICE_HOST:127.0.0.1}:${MYSQL_SERVICE_PORT:3306}/hrms?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai

#mybatis配置
mybatis.mapper-locations=classpath:mapping/*Mapper.xml
mybatis.type-aliases-package=com.qingjian.hrms.entity
## 开启MyBatis日志以便在开发环境查看SQL
logging.level.com.qingjian.hrms.dao=debug

#日志打印
logging.level.root=info

# web相关
spring.mvc.servlet.path=/
# 定位模板的目录
spring.mvc.view.prefix=/views
# 给返回的页面添加后缀名
spring.mvc.view.suffix=.jsp

# 配置静态文件访问
spring.mvc.static-path-pattern=/**

spring.devtools.restart.enabled=${DEV_MODE:false}

#pageHelper
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
